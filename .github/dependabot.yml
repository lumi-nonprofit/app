# Dependabot — version updates across all of Lumi's ecosystems (S10).
# JS app (RN/Expo), the Rust shared core, and the GitHub Actions used by CI.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      js-dependencies:
        patterns: ["*"]

  - package-ecosystem: "cargo"
    directory: "/core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      rust-dependencies:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
