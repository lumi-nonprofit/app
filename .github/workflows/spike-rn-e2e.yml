# THROWAWAY spike #1 — criterion 3 (live New-Arch round-trip). PROBE STEP 1: can the
# turbo-module even BUILD for our crate on each platform? (ubrn's own CI disables the
# Android turbo-module build as "perma-failing", so this is the crux.) gradle/xcode
# build the native turbo-module + package the .so/xcframework without needing the JS
# to be perfect. If a platform can't build, its criterion-3 leg fails at the build
# stage. Emulator/simulator RUN is added only once both build. apps/ untouched.
name: Spike RN e2e (throwaway)

on:
  workflow_dispatch: {}

permissions:
  contents: read

env:
  RN_VERSION: "0.81.4"
  BOB_VERSION: "0.49.10"
  UBRN_VERSION: "0.29.3-1"

jobs:
  android-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-java@v4
        with: { distribution: zulu, java-version: "17" }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-linux-android }
      - uses: nttld/setup-ndk@v1
        id: ndk
        with: { ndk-version: r27c }
      - name: Install cargo-ndk
        # ubrn 0.29.3-1 passes --no-strip, which cargo-ndk 4.x REMOVED. Pin 3.x.
        run: cargo install cargo-ndk --version '=3.5.4' --locked
      - name: Scaffold turbo-module (bob) + wire ubrn + our crate
        run: |
          set -euxo pipefail
          git config --global user.name ci; git config --global user.email ci@ci
          WORK="$RUNNER_TEMP/tm"; mkdir -p "$WORK"; cd "$WORK"
          npm_config_yes=true npx create-react-native-library@"$BOB_VERSION" lib \
            --react-native-version "$RN_VERSION" \
            --slug react-native-lumi-spike \
            --description spike --author-name ci --author-email ci@ci \
            --author-url https://example.com \
            --repo-url https://github.com/lumi-nonprofit/app \
            --languages kotlin-objc --type turbo-module --example vanilla
          cd lib
          mkdir -p rust && cp -R "$GITHUB_WORKSPACE/spikes/rn-ffi/rust/lumi-ffi-spike" rust/
          cat > ubrn.config.yaml <<'YAML'
          name: lumi_ffi_spike
          rust:
            directory: rust/lumi-ffi-spike
            manifestPath: Cargo.toml
          bindings:
            cpp: cpp/generated
            ts: src/generated
          YAML
          yarn add "uniffi-bindgen-react-native@$UBRN_VERSION" @ubjs/core
          echo "WORK=$WORK" >> "$GITHUB_ENV"
      - name: ubrn build android --and-generate (x86_64 emulator ABI)
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -euxo pipefail
          cd "$WORK/lib"
          yarn ubrn build android --and-generate --targets x86_64-linux-android
          echo "---- generated TS surface ----"; find src/generated -type f | head
      - name: Build example debug APK (the perma-failing crux)
        run: |
          set -euxo pipefail
          cd "$WORK/lib/example/android"
          ./gradlew assembleDebug --no-daemon
          APK=$(find . -name 'app-debug.apk' | head -1)
          echo "APK=$APK"
          echo "---- native libs packaged in APK ----"
          unzip -l "$APK" | grep -E '\.so' || true
          unzip -l "$APK" | grep -q 'liblumi_ffi_spike.so' \
            && echo "OK: our Rust .so is packaged" \
            || { echo "::error::our .so not packaged in APK"; exit 1; }

  ios-build:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios" }
      - name: Scaffold turbo-module (bob) + wire ubrn + our crate
        run: |
          set -euxo pipefail
          git config --global user.name ci; git config --global user.email ci@ci
          WORK="$RUNNER_TEMP/tm"; mkdir -p "$WORK"; cd "$WORK"
          npm_config_yes=true npx create-react-native-library@"$BOB_VERSION" lib \
            --react-native-version "$RN_VERSION" \
            --slug react-native-lumi-spike \
            --description spike --author-name ci --author-email ci@ci \
            --author-url https://example.com \
            --repo-url https://github.com/lumi-nonprofit/app \
            --languages kotlin-objc --type turbo-module --example vanilla
          cd lib
          mkdir -p rust && cp -R "$GITHUB_WORKSPACE/spikes/rn-ffi/rust/lumi-ffi-spike" rust/
          cat > ubrn.config.yaml <<'YAML'
          name: lumi_ffi_spike
          rust:
            directory: rust/lumi-ffi-spike
            manifestPath: Cargo.toml
          bindings:
            cpp: cpp/generated
            ts: src/generated
          YAML
          yarn add "uniffi-bindgen-react-native@$UBRN_VERSION" @ubjs/core
          echo "WORK=$WORK" >> "$GITHUB_ENV"
      - name: ubrn build ios --and-generate + pod install
        run: |
          set -euxo pipefail
          cd "$WORK/lib"
          # Let ubrn build its default iOS targets + assemble the full xcframework
          # (restricting to a single sim slice left the app unable to link the lib).
          yarn ubrn build ios --and-generate
          (cd example/ios && pod install)
      - name: Build example app for the iOS simulator
        run: |
          set -euxo pipefail
          cd "$WORK/lib/example/ios"
          WS=$(ls -d *.xcworkspace | head -1); SCHEME=$(basename "$WS" .xcworkspace)
          echo "workspace=$WS scheme=$SCHEME"
          xcodebuild -workspace "$WS" -scheme "$SCHEME" \
            -configuration Debug -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO build | tail -40
