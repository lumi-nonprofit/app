# THROWAWAY spike #1 (ADR 0001 §13). Proves what CI's full-toolchain runners can
# prove: host round-trip, cross-compile to real Android (NDK) + iOS targets, and
# uniffi-bindgen-react-native (ubrn) binding codegen on realistic types. The
# on-device New-Architecture round-trip (criterion 3) is NOT covered here — it
# needs an emulator/simulator e2e harness.
name: Spike RN FFI (throwaway)

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "spikes/**"
      - ".github/workflows/spike-rn-ffi.yml"

permissions:
  contents: read

env:
  CRATE: spikes/rn-ffi/rust/lumi-ffi-spike/Cargo.toml

jobs:
  # Criterion 1 (logic) — real x25519 + ChaCha20-Poly1305 round-trip through the
  # typed FFI records, on the host.
  host-roundtrip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path "$CRATE" --verbose

  # Criterion 2 (Android) — cross-compile the cdylib for arm64 Android via the NDK.
  android-crosscompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c
      - name: Install cargo-ndk (reliable, from source)
        run: cargo install cargo-ndk --locked
      - name: cargo ndk build (arm64-v8a)
        working-directory: spikes/rn-ffi/rust/lumi-ffi-spike
        env:
          ANDROID_NDK_HOME: ${{ steps.ndk.outputs.ndk-path }}
        run: cargo ndk -t arm64-v8a build --release
      - name: Show built .so
        run: find spikes/rn-ffi/rust -name '*.so' -ls

  # Criterion 2 (iOS) — cross-compile the staticlib for device + simulator on macOS.
  ios-crosscompile:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - name: cargo build (iOS device + sim)
        run: |
          cargo build --release --target aarch64-apple-ios --manifest-path "$CRATE"
          cargo build --release --target aarch64-apple-ios-sim --manifest-path "$CRATE"
      - name: Show built libs
        run: find spikes/rn-ffi/rust -name '*.a' -ls

  # Criterion 1 (codegen) + 4 (§1) + 5 (pin) — the pinned binder generates the
  # JSI/TS bindings from the realistic typed crate; we then grep the generated TS to
  # confirm no secret-key type crosses the FFI.
  ubrn-codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pinned uniffi-bindgen-react-native
        run: npm install
        working-directory: spikes/rn-ffi
      - name: Discover generate-jsi-bindings CLI (always; first call also compiles ubrn)
        working-directory: spikes/rn-ffi
        run: npx ubrn generate jsi bindings --help || true
      - name: ubrn generate jsi bindings (TS + C++ from the Rust)
        id: gen
        continue-on-error: true
        working-directory: spikes/rn-ffi
        run: npx ubrn generate jsi bindings --config ubrn.config.yaml
      - name: Show generated bindings
        if: always()
        working-directory: spikes/rn-ffi
        run: find generated -type f -print 2>/dev/null || echo "(no generated/ dir)"
      - name: "§1 gate: bindings exist + no secret type crosses the FFI"
        working-directory: spikes/rn-ffi
        run: |
          if [ ! -d generated ] || [ -z "$(find generated -type f)" ]; then
            echo "::error::no bindings generated — see 'generate jsi bindings --help' above"
            exit 1
          fi
          echo "---- exported function signatures in generated TS ----"
          grep -rInE "export function (newDeviceKey|publicKey|sealCheckin|openCheckin)" generated || true
          echo "---- assert NO secret/private-key symbol leaks into TS bindings ----"
          if grep -rIniE "secret|private[_-]?key|staticsecret" generated; then
            echo "::error::§1 VIOLATION: a secret-key symbol appears in the generated FFI bindings"
            exit 1
          fi
          echo "§1 OK: bindings present, no secret/private-key symbol crosses the FFI"
      - name: Upload generated bindings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ubrn-generated
          path: spikes/rn-ffi/generated/**
          if-no-files-found: warn
