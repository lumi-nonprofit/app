# ubrn config for the LOCAL spike crate.
# directory = the Rust crate/workspace dir (relative to this project root);
# manifestPath = relative to that dir. (Matches ubrn's canonical single-crate form.)
---
name: lumi_ffi_spike
rust:
  directory: rust/lumi-ffi-spike
  manifestPath: Cargo.toml
bindings:
  cpp: generated/cpp
  ts: generated/ts
